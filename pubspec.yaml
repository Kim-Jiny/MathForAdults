name: math_for_adults
description: "어른을 위한 수능 수학 — 다시 시작하는 수학 학습 앱"
publish_to: 'none'

version: 1.0.1+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  # LaTeX 수식 렌더링 (수식 문제 대응)
  flutter_math_fork: ^0.7.4
  # 로컬 저장 (진도 영속화)
  shared_preferences: ^2.3.3
  # 문의하기 서버 전송
  http: ^1.2.2
  # 약관/지원 페이지 열기
  url_launcher: ^6.3.1
  # 로컬 알림 (학습 리마인더)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  # AdMob 배너 + 전면 + 보상형 광고 (UMP 동의 SDK 포함)
  google_mobile_ads: ^9.0.0
  # iOS ATT(추적 동의) 프롬프트
  app_tracking_transparency: ^2.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 앱 아이콘 / 스플래시 생성
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/problems/
    - assets/concepts.json
    - assets/icon.png

# 앱 아이콘 (dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#DEE8F1"
  adaptive_icon_foreground: "assets/icon.png"

# 스플래시 (dart run flutter_native_splash:create)
# cover(센터크롭): 짧은 쪽 기준으로 화면을 꽉 채우고 넘치는 부분은 잘라냄.
flutter_native_splash:
  color: "#CBDEF1"
  image: "assets/splash.png"
  fullscreen: false
  ios_content_mode: scaleAspectFill
  android_gravity: fill
  android_12:
    image: "assets/icon.png"
    color: "#DEE8F1"
  android: true
  ios: true
  web: false
