name: math_for_adults
description: "어른을 위한 수능 수학 — 다시 시작하는 수학 학습 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  # LaTeX 수식 렌더링 (수식 문제 대응)
  flutter_math_fork: ^0.7.4
  # 로컬 저장 (추후 진도 영속화용)
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 앱 아이콘 / 스플래시 생성
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/problems/

# 앱 아이콘 (dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#DEE8F1"
  adaptive_icon_foreground: "assets/icon.png"

# 스플래시 (dart run flutter_native_splash:create)
flutter_native_splash:
  color: "#CBDEF1"
  image: "assets/splash.png"
  android_12:
    image: "assets/icon.png"
    color: "#DEE8F1"
  android: true
  ios: true
  web: false
