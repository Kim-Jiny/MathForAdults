name: math_for_adults
description: "어른을 위한 수능 수학 — 다시 시작하는 수학 학습 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  # LaTeX 수식 렌더링 (수식 문제 대응)
  flutter_math_fork: ^0.7.4
  # 로컬 저장 (추후 진도 영속화용)
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/problems/
